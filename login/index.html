<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Mr. EdLo's Virtual Classroom</title>
<link rel="icon" href="https://i.postimg.cc/bwyD9j9w/Teacher-ed-Logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ═══ THEME VARIABLES (matches site) ═══ */
  :root, body.theme-night {
    --bg:            #1a1a2e;
    --body-color:    #ffffff;
    --card-bg:       rgba(255,255,255,0.07);
    --card-border:   rgba(255,255,255,0.10);
    --card-shadow:   rgba(0,0,0,0.40);
    --subtitle-c:    rgba(255,255,255,0.55);
    --input-bg:      rgba(255,255,255,0.08);
    --input-border:  rgba(255,255,255,0.18);
    --input-color:   #ffffff;
    --h1-grad:       linear-gradient(135deg,#fff 0%,#4DABF7 50%,#20C997 100%);
    --btn-bg:        #20C997;
    --btn-c:         #1a1a2e;
    --link-c:        #4DABF7;
    --error-bg:      rgba(255,107,107,0.15);
    --error-border:  rgba(255,107,107,0.45);
    --error-c:       #FF8787;
    --footer-copy:   rgba(255,255,255,0.20);
    --radial1:       #1e3a5f55;
    --radial2:       #2d1b6955;
    --star-show:     1;
  }
  body.theme-sunny {
    --bg:            #fffbea;
    --body-color:    #2d2000;
    --card-bg:       rgba(255,255,255,0.75);
    --card-border:   rgba(200,150,0,0.18);
    --card-shadow:   rgba(180,100,0,0.18);
    --subtitle-c:    rgba(100,60,0,0.65);
    --input-bg:      #ffffff;
    --input-border:  rgba(200,150,0,0.35);
    --input-color:   #2d2000;
    --h1-grad:       linear-gradient(135deg,#b35c00 0%,#e67e00 50%,#f5a623 100%);
    --btn-bg:        #FF922B;
    --btn-c:         #ffffff;
    --link-c:        #b35c00;
    --error-bg:      rgba(200,40,40,0.10);
    --error-border:  rgba(200,40,40,0.35);
    --error-c:       #a02020;
    --footer-copy:   rgba(100,60,0,0.30);
    --radial1:       rgba(255,220,80,0.25);
    --radial2:       rgba(255,160,30,0.18);
    --star-show:     0;
  }
  body.theme-cloudy {
    --bg:            #e8edf2;
    --body-color:    #1c2533;
    --card-bg:       rgba(255,255,255,0.72);
    --card-border:   rgba(100,130,160,0.18);
    --card-shadow:   rgba(50,80,120,0.15);
    --subtitle-c:    rgba(40,65,100,0.65);
    --input-bg:      #ffffff;
    --input-border:  rgba(100,130,160,0.35);
    --input-color:   #1c2533;
    --h1-grad:       linear-gradient(135deg,#1a365d 0%,#2b6cb0 50%,#4299e1 100%);
    --btn-bg:        #4A90D9;
    --btn-c:         #ffffff;
    --link-c:        #2c5282;
    --error-bg:      rgba(200,40,40,0.10);
    --error-border:  rgba(200,40,40,0.35);
    --error-c:       #a02020;
    --footer-copy:   rgba(30,60,100,0.30);
    --radial1:       rgba(150,190,240,0.30);
    --radial2:       rgba(100,140,200,0.20);
    --star-show:     0;
  }
  body.theme-nature {
    --bg:            #f0f7ee;
    --body-color:    #1a2e10;
    --card-bg:       rgba(255,255,255,0.72);
    --card-border:   rgba(60,120,40,0.18);
    --card-shadow:   rgba(20,80,10,0.15);
    --subtitle-c:    rgba(30,75,15,0.65);
    --input-bg:      #ffffff;
    --input-border:  rgba(60,120,40,0.35);
    --input-color:   #1a2e10;
    --h1-grad:       linear-gradient(135deg,#1a4d10 0%,#2e7d32 50%,#66bb6a 100%);
    --btn-bg:        #2e7d32;
    --btn-c:         #ffffff;
    --link-c:        #1a4d10;
    --error-bg:      rgba(200,40,40,0.10);
    --error-border:  rgba(200,40,40,0.35);
    --error-c:       #a02020;
    --footer-copy:   rgba(30,70,15,0.30);
    --radial1:       rgba(140,210,120,0.28);
    --radial2:       rgba(80,160,60,0.18);
    --star-show:     0;
  }

  html { overflow-x: hidden; }
  body {
    overflow-x: hidden;
    min-height: 100vh;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 20% 10%, var(--radial1), transparent 55%),
                      radial-gradient(ellipse at 80% 90%, var(--radial2), transparent 55%);
    color: var(--body-color);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* Stars (night theme only) */
  .stars { position: fixed; inset: 0; pointer-events: none; opacity: var(--star-show); transition: opacity .4s; }
  .stars span {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; opacity: .6; animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.8} }

  .wrapper {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 max(1rem, 4vw);
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .back-link {
    align-self: flex-start;
    margin: 1.2rem 0;
    color: var(--link-c);
    text-decoration: none;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    min-height: 44px;
  }
  .back-link:hover { text-decoration: underline; }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    box-shadow: 0 12px 40px var(--card-shadow);
    padding: 2.2rem 1.8rem 2rem;
    margin-bottom: 3rem;
    backdrop-filter: blur(6px);
  }

  .logo { display: block; width: 72px; height: 72px; margin: 0 auto 0.8rem; border-radius: 50%; }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.5rem, 5vw, 1.9rem);
    text-align: center;
    background: var(--h1-grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: .3rem;
  }
  .subtitle { text-align: center; color: var(--subtitle-c); font-size: .95rem; margin-bottom: 1.6rem; }

  label { display: block; font-weight: 800; font-size: .85rem; margin: 0 0 .35rem .2rem; letter-spacing: .03em; }

  input {
    width: 100%;
    min-height: 48px;
    padding: .7rem .9rem;
    margin-bottom: 1.1rem;
    font: inherit;
    font-weight: 600;
    color: var(--input-color);
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    outline: none;
  }
  input:focus { border-color: var(--btn-bg); }

  .pw-row { position: relative; }
  .pw-row input { padding-right: 3.2rem; margin-bottom: 0; }
  .pw-toggle {
    position: absolute; top: 0; right: 0;
    width: 48px; height: 48px;
    background: none; border: none; cursor: pointer;
    font-size: 1.15rem; color: var(--subtitle-c);
  }

  .error {
    display: none;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    color: var(--error-c);
    border-radius: 12px;
    padding: .7rem .9rem;
    font-weight: 700;
    font-size: .9rem;
    margin: 1.1rem 0 0;
  }
  .error.show { display: block; }

  .btn-login {
    width: 100%;
    min-height: 52px;
    margin-top: 1.3rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    letter-spacing: .03em;
    color: var(--btn-c);
    background: var(--btn-bg);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform .15s, filter .15s;
  }
  .btn-login:hover { transform: translateY(-2px); filter: brightness(1.08); }
  .btn-login:disabled { opacity: .6; cursor: wait; transform: none; }

  .help-note { text-align: center; color: var(--subtitle-c); font-size: .85rem; margin-top: 1.2rem; }

  .site-footer {
    text-align: center;
    padding: 1.2rem max(1rem, 4vw);
    color: var(--footer-copy);
    font-size: .78rem;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 640px) {
    .login-card { padding: 1.8rem 1.2rem 1.6rem; }
  }
</style>
</head>
<body class="theme-night">

<div class="stars" id="stars"></div>

<div class="wrapper">
  <a class="back-link" href="/">← Back to Virtual Classroom</a>

  <div class="login-card">
    <img class="logo" src="https://i.postimg.cc/bwyD9j9w/Teacher-ed-Logo.png" alt="Mr. EdLo's Virtual Classroom logo">
    <h1>Welcome Back!</h1>
    <p class="subtitle">Log in to track your progress!</p>

    <form id="loginForm" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="e.g. john.smith"
             autocomplete="username" autocapitalize="none" spellcheck="false" required>

      <label for="password">Password</label>
      <div class="pw-row">
        <input type="password" id="password" name="password" placeholder="Your password"
               autocomplete="current-password" required>
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">👁️</button>
      </div>

      <div class="error" id="errorBox" role="alert"></div>

      <button type="submit" class="btn-login" id="loginBtn">Log In 🚀</button>
    </form>

    <p class="help-note">Forgot your password? Ask Mr. EdLo — he can reset it for you.</p>
  </div>
</div>

<footer class="site-footer">© 2026 Mr. EdLo's Virtual Classroom — Belize · All rights reserved.</footer>

<script src="/edlo-utils.js"></script>
<script>
  // ── Respect saved theme ──
  (function () {
    var theme = localStorage.getItem('vc-theme');
    if (theme) document.body.className = 'theme-' + theme.replace('theme-', '');
  })();

  // ── Stars ──
  (function () {
    var holder = document.getElementById('stars');
    for (var i = 0; i < 60; i++) {
      var s = document.createElement('span');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 3) + 's';
      holder.appendChild(s);
    }
  })();

  // ── Where to go after login ──
  function nextPage() {
    var params = new URLSearchParams(location.search);
    var next = params.get('next');
    // only allow same-site relative paths
    if (next && next.charAt(0) === '/' && next.indexOf('//') !== 0) return next;
    return '/'; // TODO: change to '/dashboard/' once the student dashboard is live
  }

  // ── Already logged in? Skip the form ──
  if (vcGetSession()) location.replace(nextPage());

  // ── Show/hide password ──
  document.getElementById('pwToggle').addEventListener('click', function () {
    var pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.textContent = pw.type === 'password' ? '👁️' : '🙈';
  });

  // ── Submit ──
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = document.getElementById('loginBtn');
    var errorBox = document.getElementById('errorBox');
    var username = document.getElementById('username').value.trim().toLowerCase();
    var password = document.getElementById('password').value;

    errorBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Logging in…';

    vcLogin(username, password)
      .then(function () { location.replace(nextPage()); })
      .catch(function (err) {
        errorBox.textContent = err.message || 'Login failed. Please try again.';
        errorBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Log In 🚀';
      });
  });
</script>
</body>
</html>
