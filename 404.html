<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Mr. EdLo's Virtual Classroom</title>
<link rel="icon" href="https://i.postimg.cc/bwyD9j9w/Teacher-ed-Logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<script>
  /* Catch-all redirect for the Standard 6 folder move.
     Old subject pages lived at the site root (e.g. /science/...).
     They now live under /standard6/. If someone opens an old link,
     forward them to the new location automatically. */
  (function () {
    var oldSubjects = ['science', 'spanish', 'scriptures', 'computersc', 'math', 'portfolios', 'pe'];
    var path = location.pathname.replace(/^\/+/, '');   // strip leading slash(es)
    var first = path.split('/')[0].toLowerCase();
    // Only redirect genuine old-subject paths, never anything already under a grade folder.
    if (oldSubjects.indexOf(first) !== -1) {
      location.replace('/standard6/' + path + location.search + location.hash);
    }
  })();
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',system-ui,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .logo{height:64px;border-radius:12px;margin-bottom:1.5rem;box-shadow:0 4px 14px rgba(0,0,0,.25);}
  h1{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,3.2rem);background:linear-gradient(135deg,#fff,#4DABF7 50%,#20C997);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;}
  p{color:rgba(255,255,255,.6);font-weight:600;line-height:1.6;max-width:420px;margin-bottom:1.6rem;}
  .links{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;}
  a{font-family:'Fredoka One',cursive;font-size:.9rem;text-decoration:none;padding:10px 20px;border-radius:999px;color:#1a1a2e;}
  .a5{background:#4DABF7;}
  .a6{background:#20C997;}
  .ahome{background:rgba(255,255,255,.12);color:#fff;}
</style>
</head>
<body>
  <img class="logo" src="https://i.postimg.cc/bwyD9j9w/Teacher-ed-Logo.png" alt="Mr. EdLo Logo">
  <h1>Page Not Found</h1>
  <p>We couldn't find that page. It may have moved, or the link may be out of date. Pick your class below.</p>
  <div class="links">
    <a class="a5" href="/standard5/">Standard 5</a>
    <a class="a6" href="/standard6/">Standard 6</a>
    <a class="ahome" href="/">Home</a>
  </div>
</body>
</html>
